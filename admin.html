<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Admin Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

    <!-- Login Overlay -->
    <div class="admin-login-overlay" id="admin-login-overlay">
        <div class="login-card">
            <h2 class="login-title">Admin Portal</h2>
            <p class="login-subtitle">Authorized personnel only.</p>
            <form id="login-form">
                <div class="form-group">
                    <input type="text" id="username" class="form-control" placeholder="Username" required>
                    <label class="form-label">Username</label>
                </div>
                <div class="form-group">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                    <label class="form-label">Password</label>
                </div>
                <p id="login-error" style="color:#ef4444; font-size:0.8rem; margin-bottom:1rem; display:none;">Invalid credentials. (Hint: admin / admin123)</p>
                <button type="submit" class="btn btn-primary btn-full">Access Terminal</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Layout -->
    <div class="dashboard-layout" id="dashboard-layout" style="display:none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="logo">
                    <span class="logo-text">APEX</span>
                    <span class="logo-subtext">ADMIN</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="#" class="nav-item active" data-view="bookings">Bookings</a></li>
                <li><a href="#" class="nav-item" data-view="orders">Shop Orders</a></li>
                <li><a href="#" class="nav-item" data-view="clients">Client Database</a></li>
            </ul>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-outline" style="width:100%; border-color:#333;">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h2 id="view-title">Incoming Bookings</h2>
            </header>

            <div class="view-content" id="view-bookings">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Vehicle</th>
                                <th>Service</th>
                            </tr>
                        </thead>
                        <tbody id="bookings-tbody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="view-content" id="view-orders" style="display:none;">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Order ID</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Address</th>
                                <th>Items</th>
                                <th>Total (KZT)</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="view-content" id="view-clients" style="display:none;">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Last Contact Date</th>
                                <th>Source</th>
                            </tr>
                        </thead>
                        <tbody id="clients-tbody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
